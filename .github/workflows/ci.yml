name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_NAME: Tahfidzh MJ
      QURAN_DATA_PROVIDER: equran
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.15.0"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate environment
        run: corepack pnpm validate:env

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Unit and component tests
        run: corepack pnpm test -- --run

      - name: Install Playwright browser
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: corepack pnpm test:e2e

      - name: Build
        run: corepack pnpm build
