services:
  postgres:
    image: postgres:16-alpine
    container_name: tahfidzh-mj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tahfidzh
      POSTGRES_PASSWORD: tahfidzh
      POSTGRES_DB: tahfidzh_mj
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tahfidzh -d tahfidzh_mj"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
